name: Publish to npm

# Release-gated, not push-gated. Publishing only happens when a GitHub Release
# is published (or via manual dispatch), and it no-ops unless the NPM_TOKEN
# secret is configured. This prevents accidental publishes on every push to main.
on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    # Never publish from forks — only the canonical Odience Network repo.
    if: github.repository == 'odience-network/paperclip-plugin-telegram-enhanced'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - name: Publish (skips if NPM_TOKEN unset or version already published)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::warning::NPM_TOKEN secret not configured — skipping publish."
            exit 0
          fi
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          if npm view "${NAME}@${VERSION}" version 2>/dev/null; then
            echo "Version ${VERSION} already published, skipping."
          else
            npm publish --provenance --access public
          fi
